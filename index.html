<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşyeri Hekimliği Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="loginArea">
            <h1>İşyeri Hekimliği Paneli</h1>
            <div class="input-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="hekim">
            </div>
            <div class="input-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" placeholder="•••••••">
            </div>
            <button id="loginButton">Giriş Yap</button>
            <button id="testLogin">Test Girişi Yap</button>
        </div>

        <div id="mainView" style="display:none;">
            <header>
                <h2 id="welcomeMessage"></h2>
                <div>
                    <button id="addWorkplaceBtn">+ İşyeri Ekle</button>
                    <button id="logoutButton">Çıkış Yap</button>
                </div>
            </header>
            <div class="dashboard">
                <div class="sidebar">
                    <h3>İşyerleri</h3>
                    <ul id="workplaceList"></ul>
                </div>
                <div class="content">
                    <div id="workplaceActions" style="display:none;">
                        <button id="editWorkplaceBtn">Düzenle</button>
                        <button id="deleteWorkplaceBtn">Sil</button>
                    </div>
                    <h3 id="selectedWorkplace"></h3>
                    <div id="employeeList"></div>
                </div>
            </div>

            <!-- Modal -->
            <div id="workplaceModal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h3 id="modalTitle">İşyeri Ekle</h3>
                    <input type="text" id="workplaceName" placeholder="İşyeri Adı">
                    <input type="text" id="workplaceAddress" placeholder="Adres">
                    <button id="saveWorkplaceBtn">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
