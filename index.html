<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İşyeri Hekimliği Veri Takip Sistemi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Giriş Ekranı -->
  <div id="loginArea" class="login-container">
    <div class="login-box">
      <h2><i class="fas fa-user-md"></i> İşyeri Hekimliği Paneli</h2>
      <div class="mb-3">
        <label for="username" class="form-label">Kullanıcı Adı</label>
        <input type="text" id="username" class="form-control" placeholder="Kullanıcı adı">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Şifre</label>
        <input type="password" id="password" class="form-control" placeholder="Şifre">
      </div>
      <button class="btn btn-primary w-100" onclick="login()">Giriş Yap</button>
    </div>
  </div>

  <!-- Ana Panel -->
  <div id="mainView" class="container-fluid" style="display:none;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <span class="navbar-brand">İşyeri Hekimliği Paneli</span>
        <button class="btn btn-light ms-auto" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Çıkış</button>
      </div>
    </nav>

    <div class="row mt-3">
      <div class="col-md-3">
        <div class="card">
          <div class="card-header bg-primary text-white">
            <i class="fas fa-building"></i> İşyerleri
          </div>
          <div class="card-body">
            <button class="btn btn-success btn-sm mb-3" onclick="addWorkplace()"><i class="fas fa-plus"></i> Yeni Ekle</button>
            <ul class="list-group" id="workplaceList"></ul>
          </div>
        </div>
      </div>

      <div class="col-md-9">
        <div class="card">
          <div class="card-header bg-primary text-white">
            <i class="fas fa-chart-line"></i> Genel Bakış
          </div>
          <div class="card-body">
            <div id="dashboardView">
              <div class="row">
                <div class="col-md-4">
                  <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                      <h5 class="card-title">
